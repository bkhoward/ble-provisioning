<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wi-Fi Provisioning Console</title>
<style>
  :root {
    --bg: #11151a;
    --panel: #1a2128;
    --panel-border: #2a333d;
    --text: #e7ebee;
    --muted: #7c8896;
    --accent: #ff9d3d;
    --ok: #3ddc84;
    --err: #ff5c5c;
    --mono: 'SF Mono', 'JetBrains Mono', 'Roboto Mono', Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(255,157,61,0.06), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--text);
    font-family: var(--sans);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .panel {
    width: 100%;
    max-width: 420px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  h1 {
    font-size: 19px;
    font-weight: 600;
    margin: 6px 0 22px;
    letter-spacing: -0.01em;
  }

  .led {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--muted);
    box-shadow: 0 0 0 0 rgba(255,157,61,0);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .led.connecting { background: var(--accent); box-shadow: 0 0 10px 2px rgba(255,157,61,0.5); animation: pulse 1s infinite; }
  .led.connected  { background: var(--ok); box-shadow: 0 0 10px 2px rgba(61,220,132,0.5); }
  .led.failed     { background: var(--err); box-shadow: 0 0 10px 2px rgba(255,92,92,0.5); }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  button {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 9px;
    padding: 13px 18px;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.15s, transform 0.1s;
  }
  button:active { transform: scale(0.99); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  #connectBtn {
    background: var(--accent);
    color: #1a1305;
  }

  .field {
    margin-bottom: 14px;
  }
  label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #0e1318;
    border: 1px solid var(--panel-border);
    color: var(--text);
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 14px;
    font-family: var(--mono);
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }

  select {
    width: 100%;
    background: #0e1318;
    border: 1px solid var(--panel-border);
    color: var(--text);
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 14px;
    font-family: var(--mono);
  }
  select:disabled { color: var(--muted); }

  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field-row select { flex: 1; }

  .icon-btn {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
    width: auto;
    padding: 11px 13px;
    font-size: 13px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--accent); }

  .link-btn {
    background: none;
    border: none;
    color: var(--accent);
    width: auto;
    padding: 0;
    margin-top: 8px;
    font-size: 12px;
    font-family: var(--mono);
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .row { display: flex; gap: 10px; margin-top: 18px; }
  .row button.secondary {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--muted);
  }

  .status-line {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 9px;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--muted);
    min-height: 18px;
  }

  .hint {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--muted);
    line-height: 1.5;
    margin-top: 18px;
    border-top: 1px solid var(--panel-border);
    padding-top: 14px;
  }

  #form { display: none; }
</style>
</head>
<body>

  <div class="panel">
    <div class="panel-header">
      <span class="eyebrow">BLE · Wi-Fi Provisioning</span>
      <span class="led" id="led"></span>
    </div>
    <h1>Device Console</h1>

    <button id="connectBtn">Connect via Bluetooth</button>

    <div id="form">
      <div class="field">
        <label for="ssidSelect">Network</label>
        <div class="field-row">
          <select id="ssidSelect" disabled>
            <option value="">Scanning…</option>
          </select>
          <button type="button" id="rescanBtn" class="icon-btn" title="Scan again">⟳</button>
        </div>
        <button type="button" id="manualToggle" class="link-btn">Enter SSID manually</button>
      </div>
      <div class="field" id="manualField" style="display:none">
        <label for="ssidManual">SSID</label>
        <input id="ssidManual" type="text" autocomplete="off" placeholder="Network name" />
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <input id="pass" type="password" autocomplete="off" placeholder="••••••••" />
      </div>
      <div class="row">
        <button id="saveBtn">Save &amp; Connect</button>
        <button id="clearBtn" class="secondary">Forget</button>
      </div>
    </div>

    <div class="status-line">
      <span id="statusDot" class="led"></span>
      <span id="statusText">Not connected to device.</span>
    </div>

    <div class="hint">
      Requires Chrome or Edge over HTTPS (or localhost). Web Bluetooth isn't supported in Safari or Firefox.
    </div>
  </div>

<script>
  // Must match the UUIDs in wifi_ble_provisioning.ino exactly.
  const SERVICE_UUID = '19b10000-e8f2-537e-4f6c-d104768a1214';
  const SSID_UUID    = '19b10001-e8f2-537e-4f6c-d104768a1214';
  const PASS_UUID    = '19b10002-e8f2-537e-4f6c-d104768a1214';
  const CMD_UUID     = '19b10003-e8f2-537e-4f6c-d104768a1214';
  const STATUS_UUID  = '19b10004-e8f2-537e-4f6c-d104768a1214';
  const NETWORKS_UUID = '19b10005-e8f2-537e-4f6c-d104768a1214';

  let ssidChar, passChar, cmdChar, statusChar, networksChar;

  const connectBtn = document.getElementById('connectBtn');
  const form = document.getElementById('form');
  const led = document.getElementById('led');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const ssidSelect = document.getElementById('ssidSelect');
  const ssidManual = document.getElementById('ssidManual');
  const manualField = document.getElementById('manualField');
  const manualToggle = document.getElementById('manualToggle');
  const rescanBtn = document.getElementById('rescanBtn');

  function setLed(state) {
    [led, statusDot].forEach(el => {
      el.classList.remove('connecting', 'connected', 'failed');
      if (state) el.classList.add(state);
    });
  }

  function setStatus(text, state) {
    statusText.textContent = text;
    setLed(state);
  }

  connectBtn.addEventListener('click', async () => {
    if (!navigator.bluetooth) {
      setStatus('Web Bluetooth not supported in this browser.', 'failed');
      return;
    }
    try {
      connectBtn.disabled = true;
      setStatus('Scanning for device…', 'connecting');

      const device = await navigator.bluetooth.requestDevice({
        filters: [{ services: [SERVICE_UUID] }]
      });

      const server = await device.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);

      ssidChar = await service.getCharacteristic(SSID_UUID);
      passChar = await service.getCharacteristic(PASS_UUID);
      cmdChar = await service.getCharacteristic(CMD_UUID);
      statusChar = await service.getCharacteristic(STATUS_UUID);
      networksChar = await service.getCharacteristic(NETWORKS_UUID);

      await statusChar.startNotifications();
      statusChar.addEventListener('characteristicvaluechanged', (e) => {
        const text = new TextDecoder().decode(e.target.value);
        handleDeviceStatus(text);
      });

      form.style.display = 'block';
      connectBtn.textContent = 'Connected to ' + (device.name || 'device');
      setStatus('Linked. Scanning for networks…', 'connecting');
      await requestScan();
    } catch (err) {
      setStatus('Connection failed: ' + err.message, 'failed');
    } finally {
      connectBtn.disabled = false;
    }
  });

  function handleDeviceStatus(text) {
    if (text.startsWith('CONNECTED')) {
      const ip = text.split(':').slice(1).join(':');
      setStatus('Device connected to Wi-Fi' + (ip ? ' — ' + ip : ''), 'connected');
    } else if (text === 'CONNECTING') {
      setStatus('Device is joining the network…', 'connecting');
    } else if (text === 'SCANNING') {
      setStatus('Scanning for nearby networks…', 'connecting');
    } else if (text === 'SCAN_DONE') {
      loadScannedNetworks();
    } else if (text.startsWith('FAILED')) {
      setStatus('Device failed to connect: ' + text, 'failed');
    } else if (text === 'CLEARED') {
      setStatus('Stored credentials cleared on device.', null);
    } else {
      setStatus('Device status: ' + text, null);
    }
  }

  async function requestScan() {
    ssidSelect.disabled = true;
    ssidSelect.innerHTML = '<option value="">Scanning…</option>';
    await cmdChar.writeValue(new Uint8Array([3])); // 3 = scan
  }

  async function loadScannedNetworks() {
    const value = await networksChar.readValue();
    const text = new TextDecoder().decode(value).trim();
    const networks = text.length ? text.split('\n') : [];

    ssidSelect.innerHTML = '';
    if (networks.length === 0) {
      ssidSelect.innerHTML = '<option value="">No networks found</option>';
      setStatus('No networks found — try rescanning or enter SSID manually.', 'failed');
    } else {
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = 'Select a network…';
      ssidSelect.appendChild(placeholder);
      networks.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        ssidSelect.appendChild(opt);
      });
      setStatus('Found ' + networks.length + ' network(s). Pick one below.', null);
    }
    ssidSelect.disabled = false;
  }

  manualToggle.addEventListener('click', () => {
    const showingManual = manualField.style.display !== 'none';
    manualField.style.display = showingManual ? 'none' : 'block';
    ssidSelect.closest('.field').style.display = showingManual ? 'block' : 'none';
    manualToggle.textContent = showingManual ? 'Enter SSID manually' : 'Choose from scanned networks';
  });

  rescanBtn.addEventListener('click', requestScan);

  document.getElementById('saveBtn').addEventListener('click', async () => {
    const usingManual = manualField.style.display !== 'none';
    const ssid = (usingManual ? ssidManual.value : ssidSelect.value).trim();
    const pass = document.getElementById('pass').value;
    if (!ssid) { setStatus('Choose or enter an SSID first.', 'failed'); return; }

    const enc = new TextEncoder();
    await ssidChar.writeValue(enc.encode(ssid));
    await passChar.writeValue(enc.encode(pass));
    await cmdChar.writeValue(new Uint8Array([1])); // 1 = save & connect
    setStatus('Sent credentials. Waiting on device…', 'connecting');
  });

  document.getElementById('clearBtn').addEventListener('click', async () => {
    await cmdChar.writeValue(new Uint8Array([2])); // 2 = forget
    setStatus('Requested device forget its network…', null);
  });
</script>

</body>
</html>
